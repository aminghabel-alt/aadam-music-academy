<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>آدام — آکادمی موسیقی</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0f" />
</head>
<body>

  <!-- ═══════════════════════════════ NOTIFICATION ═══════════════════════════════ -->
  <div id="notif" class="notif hidden"></div>

  <!-- ═══════════════════════════════ AUTH SCREEN ═══════════════════════════════ -->
  <div id="screen-auth" class="screen active" style="position:relative;z-index:1">
    <div class="auth-container">
      <div class="auth-logo">
        <span class="logo-symbol">𝄞</span>
        <h1 class="logo-title">آدام</h1>
        <p class="logo-sub">آکادمی موسیقی</p>
      </div>

      <!-- Tab Switch -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">ورود</button>
        <button class="auth-tab" data-tab="register">ثبت‌نام</button>
      </div>

      <!-- Login Form -->
      <form id="form-login" class="auth-form active">
        <div class="field">
          <label>ایمیل</label>
          <input type="email" id="login-email" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>رمز عبور</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary">ورود</button>
      </form>

      <!-- Register Form -->
      <form id="form-register" class="auth-form">
        <div class="field">
          <label>نام کامل</label>
          <input type="text" id="reg-name" placeholder="نام و نام خانوادگی" />
        </div>
        <div class="field">
          <label>ایمیل</label>
          <input type="email" id="reg-email" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>رمز عبور</label>
          <input type="password" id="reg-password" placeholder="حداقل ۶ کاراکتر" autocomplete="new-password" />
        </div>

        <!-- Role Selection -->
        <div class="field">
          <label>نقش شما</label>
          <div class="role-selector">
            <label class="role-option">
              <input type="radio" name="role" value="teacher" />
              <span class="role-card">
                <span class="role-icon">🎸</span>
                <span class="role-label">مربی</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="student" />
              <span class="role-card">
                <span class="role-icon">🎵</span>
                <span class="role-label">هنرجو</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="parent" />
              <span class="role-card">
                <span class="role-icon">👪</span>
                <span class="role-label">والدین</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Invite Code (student/parent) -->
        <div class="field" id="field-invite" style="display:none">
          <label>کد دعوت استاد</label>
          <input type="text" id="reg-invite" placeholder="کد ۶ رقمی استاد" maxlength="10" />
        </div>

        <button type="submit" class="btn-primary">ثبت‌نام</button>
      </form>
    </div>
  </div>

  <!-- ═══════════════════════════════ DASHBOARD — TEACHER ═══════════════════════════════ -->
  <div id="screen-teacher" class="screen">
    <!-- Header -->
    <header class="app-header">
      <div class="header-right">
        <span class="header-logo">𝄞</span>
        <span class="header-title">آدام</span>
      </div>
      <div class="header-left">
        <span id="teacher-name-display" class="header-user"></span>
        <button id="btn-logout" class="btn-icon" title="خروج">⏻</button>
      </div>
    </header>

    <!-- Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-panel="panel-students">
        <span class="nav-icon">👥</span>
        <span class="nav-label">هنرجوها</span>
      </button>
      <button class="nav-item" data-panel="panel-scores">
        <span class="nav-icon">📊</span>
        <span class="nav-label">نمرات</span>
      </button>
      <button class="nav-item" data-panel="panel-messages">
        <span class="nav-icon">💬</span>
        <span class="nav-label">پیام‌ها</span>
      </button>
      <button class="nav-item" data-panel="panel-settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">تنظیمات</span>
      </button>
    </nav>

    <!-- Panels -->
    <main class="panels">

      <!-- Panel: Students -->
      <div id="panel-students" class="panel active">
        <div class="panel-header">
          <h2>هنرجوها</h2>
          <button id="btn-add-student" class="btn-gold">+ افزودن</button>
        </div>
        <div id="students-list" class="students-list">
          <div class="empty-state">در حال بارگذاری...</div>
        </div>
      </div>

      <!-- Panel: Scores -->
      <div id="panel-scores" class="panel">
        <div class="panel-header">
          <h2>ثبت نمره</h2>
        </div>
        <div class="field">
          <label>انتخاب هنرجو</label>
          <select id="score-student-select">
            <option value="">— انتخاب کنید —</option>
          </select>
        </div>
        <div id="score-form-wrap" style="display:none">
          <div class="field">
            <label>شماره جلسه</label>
            <input type="number" id="score-session" min="1" placeholder="مثلاً ۵" />
          </div>
          <div class="field absent-toggle">
            <label class="toggle-label">
              <input type="checkbox" id="score-absent" />
              <span class="toggle-track"></span>
              <span>غیبت</span>
            </label>
          </div>
          <div id="score-fields">
            <div class="score-grid">
              <div class="field">
                <label>تکنیک <span class="score-max">/۲۰</span></label>
                <input type="number" id="score-technique" min="0" max="20" />
              </div>
              <div class="field">
                <label>ریتم <span class="score-max">/۲۰</span></label>
                <input type="number" id="score-rhythm" min="0" max="20" />
              </div>
              <div class="field">
                <label>ملودی <span class="score-max">/۲۰</span></label>
                <input type="number" id="score-melody" min="0" max="20" />
              </div>
              <div class="field">
                <label>دانش دسته <span class="score-max">/۲۰</span></label>
                <input type="number" id="score-fretboard" min="0" max="20" />
              </div>
              <div class="field">
                <label>شنیداری <span class="score-max">/۲۰</span></label>
                <input type="number" id="score-ear" min="0" max="20" />
              </div>
            </div>
            <div class="score-average-display">
              میانگین: <span id="score-avg-display">—</span>
            </div>
          </div>
          <div class="field">
            <label>نظر مربی</label>
            <textarea id="score-comment" placeholder="نکات جلسه..." rows="3"></textarea>
          </div>
          <button id="btn-save-score" class="btn-primary">ذخیره نمره</button>
        </div>
      </div>

      <!-- Panel: Messages -->
      <div id="panel-messages" class="panel">
        <div class="panel-header">
          <h2>پیام‌ها</h2>
        </div>
        <div class="field">
          <label>ارسال به</label>
          <select id="msg-to-select">
            <option value="">— انتخاب هنرجو —</option>
          </select>
        </div>
        <div id="messages-list" class="messages-list"></div>
        <div class="message-input-wrap">
          <textarea id="msg-body" placeholder="پیام خود را بنویسید..." rows="2"></textarea>
          <button id="btn-send-msg" class="btn-gold">ارسال</button>
        </div>
      </div>
      
<!-- Panel: Lessons -->
<div id="panel-lessons" class="panel">
  <div class="panel-header">
    <h2>محتوای آموزشی</h2>
    <button id="btn-add-lesson" class="btn-gold">+ درس جدید</button>
  </div>
  <div id="lessons-list" class="students-list">
    <div class="empty-state">در حال بارگذاری...</div>
  </div>
</div>

      <!-- Panel: Settings -->
      <div id="panel-settings" class="panel">
        <div class="panel-header">
          <h2>تنظیمات</h2>
        </div>
        <div class="settings-card">
          <div class="setting-row">
            <span>کد دعوت شما</span>
            <span id="invite-code-display" class="invite-code">—</span>
          </div>
          <button id="btn-copy-invite" class="btn-outline">کپی کد دعوت</button>
        </div>
      </div>

    </main>
  </div>

  <!-- ═══════════════════════════════ DASHBOARD — STUDENT ═══════════════════════════════ -->
  <div id="screen-student" class="screen">
    <header class="app-header">
      <div class="header-right">
        <span class="header-logo">𝄞</span>
        <span class="header-title">آدام</span>
      </div>
      <div class="header-left">
        <span id="student-name-display" class="header-user"></span>
        <button id="btn-logout-student" class="btn-icon">⏻</button>
      </div>
    </header>

    <nav class="bottom-nav">
      <button class="nav-item active" data-panel="panel-my-scores">
        <span class="nav-icon">📊</span>
        <span class="nav-label">کارنامه</span>
      </button>
      <button class="nav-item" data-panel="panel-practice">
        <span class="nav-icon">⏱️</span>
        <span class="nav-label">تمرین</span>
      </button>
      <button class="nav-item" data-panel="panel-student-msgs">
        <span class="nav-icon">💬</span>
        <span class="nav-label">پیام‌ها</span>
      </button>
    </nav>

    <main class="panels">
      <div id="panel-my-scores" class="panel active">
        <div class="panel-header"><h2>کارنامه من</h2></div>
        <div id="my-scores-list" class="scores-list"></div>
      </div>
      <div id="panel-practice" class="panel">
        <div class="panel-header"><h2>تمرین امروز</h2></div>
        <div class="practice-timer">
          <div id="timer-display" class="timer-display">۰۰:۰۰</div>
          <div class="timer-buttons">
            <button id="btn-timer-start" class="btn-gold">شروع</button>
            <button id="btn-timer-stop" class="btn-outline" style="display:none">توقف و ذخیره</button>
          </div>
          <div class="field" style="margin-top:1rem">
            <label>یادداشت</label>
            <textarea id="practice-note" placeholder="چی تمرین کردی؟" rows="2"></textarea>
          </div>
        </div>
      </div>
      <div id="panel-student-msgs" class="panel">
        <div class="panel-header"><h2>پیام‌ها</h2></div>
        <div id="student-messages-list" class="messages-list"></div>
        <div class="message-input-wrap">
          <textarea id="student-msg-body" placeholder="پیام به استاد..." rows="2"></textarea>
          <button id="btn-student-send-msg" class="btn-gold">ارسال</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ═══════════════════════════════ MODAL — ADD STUDENT ═══════════════════════════════ -->
  <div id="modal-add-student" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h3>افزودن هنرجو</h3>
        <button class="modal-close" data-modal="modal-add-student">✕</button>
      </div>
      <form id="form-add-student">
        <div class="field"><label>نام کامل *</label><input type="text" id="st-name" required /></div>
        <div class="field"><label>تلفن</label><input type="tel" id="st-phone" /></div>
        <div class="field"><label>سن</label><input type="number" id="st-age" min="4" max="80" /></div>
        <div class="field"><label>ساز</label><input type="text" id="st-instrument" placeholder="گیتار، پیانو، ..." /></div>
        <div class="field">
          <label>سطح</label>
          <select id="st-level">
            <option value="">— انتخاب —</option>
            <option value="beginner">مبتدی</option>
            <option value="intermediate">متوسط</option>
            <option value="advanced">پیشرفته</option>
          </select>
        </div>
        <div class="field"><label>شهریه ماهانه (تومان)</label><input type="number" id="st-fee" /></div>
        <div class="field">
          <label>نوع کلاس</label>
          <select id="st-class-type">
            <option value="in-person">حضوری</option>
            <option value="online">آنلاین</option>
          </select>
        </div>
        <div class="field"><label>ساعت کلاس</label><input type="text" id="st-time" placeholder="مثلاً ۱۷:۰۰" /></div>
        <div class="field"><label>یادداشت</label><textarea id="st-notes" rows="2"></textarea></div>
        <button type="submit" class="btn-primary">ذخیره هنرجو</button>
      </form>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
